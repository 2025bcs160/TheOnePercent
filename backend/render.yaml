services:
  - type: web
    name: trading-dashboard-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT backend.app_flask:app
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://theonepercen.com,https://www.theonepercen.com,https://the-one-percent-nine.vercel.app